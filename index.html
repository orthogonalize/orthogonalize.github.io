.card {
position: relative;
z-index: 1;
width: 340px;
background: rgba(30, 35, 50, 0.2);
backdrop-filter: blur(18px);
-webkit-backdrop-filter: blur(18px);
border-radius: 24px;
padding: 36px 28px 32px;
display: flex;
flex-direction: column;
align-items: center;
box-shadow: 0 8px 40px rgba(0,0,0,0.45);
border: 1px solid rgba(255,255,255,0.08);
animation: fadeIn 0.6s ease both;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(16px); }
to   { opacity: 1; transform: translateY(0); }
}

.avatar {
width: 96px;
height: 96px;
border-radius: 50%;
border: 3px solid rgba(255,255,255,0.12);
background: #2a2f44;
margin-bottom: 16px;
display: flex;
align-items: center;
justify-content: center;
font-size: 48px;
overflow: hidden;
}

.avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.name {
font-size: 20px;
font-weight: 400;
color: #c97aff;
letter-spacing: 0.04em;
margin-bottom: 12px;
}

.handle-wrap {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 6px;
}

.handle-icon {
width: 36px; height: 36px;
background: rgba(255,255,255,0.1);
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 18px;
}

.handle { font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.75); letter-spacing: 0.02em; }

.divider { width: 100%; height: 1px; background: rgba(255,255,255,0.08); margin: 22px 0 20px; }

/* Social row */
.socials {
display: flex;
gap: 14px;
align-items: center;
justify-content: center;
}

.social-btn {
width: 50px; height: 50px;
border-radius: 14px;
background: rgba(130, 80, 220, 0.25);
border: 1px solid rgba(160, 100, 255, 0.3);
display: flex; align-items: center; justify-content: center;
text-decoration: none;
transition: background 0.2s, transform 0.15s, border-color 0.2s;
cursor: pointer;
}

.social-btn:hover {
background: rgba(150, 90, 255, 0.45);
border-color: rgba(180, 120, 255, 0.6);
transform: translateY(-2px);
}

.social-btn svg { width: 22px; height: 22px; fill: #b080ff; pointer-events: none; }

/* X dropdown */
.x-wrap { position: relative; }

.x-dropdown {
position: absolute;
bottom: calc(100% + 10px);
left: 50%;
transform: translateX(-50%) scaleY(0.8);
transform-origin: bottom center;
background: rgba(15, 10, 28, 0.95);
backdrop-filter: blur(14px);
border: 1px solid rgba(160, 100, 255, 0.35);
border-radius: 12px;
padding: 6px;
display: flex;
flex-direction: column;
gap: 3px;
min-width: 130px;
opacity: 0;
transition: opacity 0.18s, transform 0.18s;
pointer-events: none;
z-index: 10;
}

.x-wrap.open .x-dropdown {
opacity: 1;
transform: translateX(-50%) scaleY(1);
pointer-events: auto;
}

.x-dropdown a {
display: flex;
align-items: center;
gap: 8px;
padding: 7px 10px;
border-radius: 8px;
text-decoration: none;
color: rgba(255,255,255,0.85);
font-size: 13px;
letter-spacing: 0.03em;
transition: background 0.15s;
}

.x-dropdown a:hover { background: rgba(160, 100, 255, 0.22); }

.x-dropdown a svg { width: 13px; height: 13px; fill: #b080ff; flex-shrink: 0; }

/* Discord copy toast */
.discord-wrap { position: relative; }

.copy-toast {
position: absolute;
bottom: calc(100% + 10px);
left: 50%;
transform: translateX(-50%);
background: rgba(15, 10, 28, 0.95);
border: 1px solid rgba(160, 100, 255, 0.35);
border-radius: 8px;
padding: 5px 10px;
font-size: 12px;
color: #c97aff;
white-space: nowrap;
opacity: 0;
pointer-events: none;
transition: opacity 0.2s;
}

.copy-toast.show { opacity: 1; }

/* Footer */
.footer {
position: fixed;
bottom: 18px; left: 0; right: 0;
display: flex;
justify-content: center;
gap: 10px;
color: rgba(255,255,255,0.45);
font-size: 12px;
z-index: 2;
align-items: center;
}

.footer svg { width: 13px; height: 13px; fill: rgba(255,255,255,0.45); }

/* Like button */
.like-btn {
display: flex;
align-items: center;
gap: 5px;
background: none;
border: none;
cursor: pointer;
color: rgba(255,255,255,0.45);
font-size: 12px;
font-family: inherit;
padding: 0;
transition: color 0.2s;
}
.like-btn:hover { color: rgba(255,255,255,0.75); }
.like-btn.liked { color: #c97aff; }
.like-btn svg { width: 14px; height: 14px; fill: rgba(255,255,255,0.45); transition: fill 0.2s, transform 0.15s; }
.like-btn.liked svg { fill: #c97aff; }
.like-btn.pop svg { transform: scale(1.5); }

/* Music player */
.music-bar {
position: fixed;
bottom: 50px;
left: 50%;
transform: translateX(-50%);
display: flex;
align-items: center;
gap: 10px;
background: rgba(15, 10, 28, 0.85);
backdrop-filter: blur(14px);
border: 1px solid rgba(160, 100, 255, 0.3);
border-radius: 999px;
padding: 7px 16px;
z-index: 10;
min-width: 220px;
max-width: 300px;
}

.music-play-btn {
background: none;
border: none;
cursor: pointer;
padding: 0;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
}

.music-play-btn svg {
width: 18px; height: 18px;
fill: #b080ff;
transition: fill 0.2s;
}

.music-play-btn:hover svg { fill: #c97aff; }

.music-info {
flex: 1;
overflow: hidden;
}

.music-title {
font-size: 11px;
color: rgba(255,255,255,0.75);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.music-bar-dots {
display: flex;
gap: 3px;
align-items: center;
flex-shrink: 0;
}

.music-bar-dots span {
width: 3px;
height: 3px;
border-radius: 50%;
background: #b080ff;
animation: dotBounce 1.2s ease-in-out infinite;
opacity: 0.5;
}

.music-bar-dots span:nth-child(2) { animation-delay: 0.2s; }
.music-bar-dots span:nth-child(3) { animation-delay: 0.4s; }

.music-bar.paused .music-bar-dots span { animation-play-state: paused; opacity: 0.3; }

@keyframes dotBounce {
0%, 100% { transform: scaleY(1); }
50% { transform: scaleY(2.2); }
}

/* hidden YouTube iframe */
#ytPlayer { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

/* Discord status ring */
.avatar-wrap {
position: relative;
margin-bottom: 16px;
}

.avatar-wrap .avatar {
margin-bottom: 0;
}

.status-ring {
position: absolute;
inset: -4px;
border-radius: 50%;
border: 3px solid transparent;
transition: border-color 0.4s;
pointer-events: none;
}

.status-ring.online  { border-color: #3ba55d; box-shadow: 0 0 8px #3ba55d88; }
.status-ring.idle    { border-color: #faa81a; box-shadow: 0 0 8px #faa81a88; }
.status-ring.dnd     { border-color: #ed4245; box-shadow: 0 0 8px #ed424588; }
.status-ring.offline { border-color: rgba(255,255,255,0.15); box-shadow: none; }

/* Rain canvas */
#rainCanvas {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 1;
}

/* DM Modal */
.dm-btn {
position: fixed;
bottom: 18px;
right: 20px;
width: 44px;
height: 44px;
border-radius: 50%;
background: rgba(130, 80, 220, 0.35);
border: 1px solid rgba(160, 100, 255, 0.4);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
z-index: 10;
transition: background 0.2s, transform 0.15s;
backdrop-filter: blur(10px);
}
.dm-btn:hover { background: rgba(150, 90, 255, 0.5); transform: scale(1.08); }
.dm-btn svg { width: 18px; height: 18px; fill: #b080ff; }

.dm-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.5);
backdrop-filter: blur(4px);
z-index: 20;
display: none;
align-items: center;
justify-content: center;
}
.dm-overlay.open { display: flex; }

.dm-modal {
width: 300px;
background: rgba(15, 10, 28, 0.95);
border: 1px solid rgba(160, 100, 255, 0.35);
border-radius: 18px;
padding: 24px;
display: flex;
flex-direction: column;
gap: 12px;
animation: fadeIn 0.2s ease;
}

.dm-modal h3 {
font-size: 15px;
font-weight: 400;
color: rgba(255,255,255,0.9);
letter-spacing: 0.04em;
margin: 0;
}

.dm-modal textarea {
background: rgba(255,255,255,0.06);
border: 1px solid rgba(160,100,255,0.25);
border-radius: 10px;
padding: 10px 12px;
color: rgba(255,255,255,0.85);
font-family: inherit;
font-size: 13px;
resize: none;
height: 100px;
outline: none;
transition: border-color 0.2s;
}
.dm-modal textarea:focus { border-color: rgba(160,100,255,0.6); }
.dm-modal textarea::placeholder { color: rgba(255,255,255,0.3); }

.dm-actions {
display: flex;
gap: 8px;
justify-content: flex-end;
}

.dm-cancel {
background: none;
border: 1px solid rgba(255,255,255,0.15);
border-radius: 8px;
padding: 7px 14px;
color: rgba(255,255,255,0.5);
font-family: inherit;
font-size: 13px;
cursor: pointer;
transition: border-color 0.2s, color 0.2s;
}
.dm-cancel:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.7); }

.dm-send {
background: rgba(130,80,220,0.4);
border: 1px solid rgba(160,100,255,0.4);
border-radius: 8px;
padding: 7px 16px;
color: #c97aff;
font-family: inherit;
font-size: 13px;
cursor: pointer;
transition: background 0.2s;
}
.dm-send:hover { background: rgba(150,90,255,0.55); }
.dm-send:disabled { opacity: 0.4; cursor: not-allowed; }

.dm-status {
font-size: 12px;
color: rgba(255,255,255,0.45);
text-align: center;
min-height: 16px;
}
.dm-status.error { color: #ff6b6b; }
.dm-status.success { color: #3ba55d; }
.dm-cooldown { font-size: 11px; color: rgba(255,255,255,0.3); text-align:center; }
</style>

</head>

<script>
  // ── X dropdown ──
  const xWrap = document.getElementById('xWrap');
  const xBtn  = document.getElementById('xBtn');
  xBtn.addEventListener('click', (e) => { e.stopPropagation(); xWrap.classList.toggle('open'); });
  document.addEventListener('click', () => xWrap.classList.remove('open'));

  // ── Discord copy ──
  const discordBtn = document.getElementById('discordBtn');
  const copyToast  = document.getElementById('copyToast');
  let toastTimer;
  discordBtn.addEventListener('click', () => {
    navigator.clipboard.writeText('3423').then(() => {
      copyToast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => copyToast.classList.remove('show'), 1800);
    });
  });

  // ── Like button ──
  const likeBtn   = document.getElementById('likeBtn');
  const likeCount = document.getElementById('likeCount');
  let count = parseInt(localStorage.getItem('likeCount') || '0');
  likeCount.textContent = count;
  likeBtn.addEventListener('click', () => {
    count++;
    localStorage.setItem('likeCount', count);
    likeCount.textContent = count;
    likeBtn.classList.add('liked', 'pop');
    setTimeout(() => likeBtn.classList.remove('pop'), 200);
  });

  // ── Discord status (Lanyard API) ──
  const DISCORD_ID = '1273809222768918635';
  const statusRing = document.getElementById('statusRing');

  async function fetchStatus() {
    try {
      const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
      const data = await res.json();
      if (data.success) {
        const s = data.data.discord_status; // online / idle / dnd / offline
        statusRing.className = 'status-ring ' + s;
      }
    } catch(e) {}
  }
  fetchStatus();
  setInterval(fetchStatus, 30000); // 30秒ごとに更新

  // ── YouTube Music Player ──
  const VIDEOS = [
    'm2q4XwSne6I',
    'KfOd-eBoqtw',
    'zlGvUXTnYLw'
  ];

  let player, currentIdx, isPlaying = false;
  const musicBar     = document.getElementById('musicBar');
  const musicPlayBtn = document.getElementById('musicPlayBtn');
  const musicTitle   = document.getElementById('musicTitle');
  const playIcon     = document.getElementById('playIcon');

  const PLAY_SVG  = '<path d="M8 5v14l11-7z"/>';
  const PAUSE_SVG = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

  function shuffled(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  let playlist = shuffled(VIDEOS);
  currentIdx = 0;

  // Load YouTube IFrame API
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = function() {
    player = new YT.Player('ytPlayer', {
      height: '1', width: '1',
      videoId: playlist[currentIdx],
      playerVars: { autoplay: 0, controls: 0, playsinline: 1 },
      events: {
        onReady: onPlayerReady,
        onStateChange: onPlayerStateChange
      }
    });
  };

  function onPlayerReady(e) {
    musicTitle.textContent = '▶ タップして再生';
  }

  function onPlayerStateChange(e) {
    if (e.data === YT.PlayerState.PLAYING) {
      isPlaying = true;
      musicBar.classList.remove('paused');
      playIcon.innerHTML = PAUSE_SVG;
      musicTitle.textContent = player.getVideoData().title || '再生中';
    } else if (e.data === YT.PlayerState.PAUSED) {
      isPlaying = false;
      musicBar.classList.add('paused');
      playIcon.innerHTML = PLAY_SVG;
    } else if (e.data === YT.PlayerState.ENDED) {
      currentIdx = (currentIdx + 1) % playlist.length;
      if (currentIdx === 0) playlist = shuffled(VIDEOS);
      player.loadVideoById(playlist[currentIdx]);
      player.playVideo();
    }
  }

  musicPlayBtn.addEventListener('click', () => {
    if (!player) return;
    if (isPlaying) {
      player.pauseVideo();
    } else {
      player.playVideo();
    }
  });

  // ── Realistic Rain & Condensation ──
  const rainCanvas = document.getElementById('rainCanvas');
  const rc = rainCanvas.getContext('2d');

  function resizeRain() {
    rainCanvas.width  = window.innerWidth;
    rainCanvas.height = window.innerHeight;
  }
  resizeRain();
  window.addEventListener('resize', () => { resizeRain(); });

  // ── Falling rain ──
  function makeRainDrop() {
    return {
      x: Math.random() * rainCanvas.width,
      y: Math.random() * rainCanvas.height - rainCanvas.height,
      len: Math.random() * 22 + 10,
      speed: Math.random() * 5 + 8,
      alpha: Math.random() * 0.18 + 0.05,
      width: Math.random() * 0.6 + 0.2,
      wind: -0.8  // slight angle
    };
  }
  const rainDrops = Array.from({ length: 120 }, () => {
    const d = makeRainDrop();
    d.y = Math.random() * rainCanvas.height; // start spread across screen
    return d;
  });

  // ── Glass condensation drops ──
  function makeCondensation() {
    const sliding = Math.random() < 0.22;
    // spread across full screen including top
    const y = Math.random() * window.innerHeight;
    return {
      x: Math.random() * window.innerWidth,
      y: y,
      r: Math.random() * (sliding ? 7 : 4) + 1.5,
      alpha: Math.random() * 0.22 + 0.08,
      vy: sliding ? Math.random() * 0.5 + 0.15 : 0,
      vx: sliding ? (Math.random() - 0.5) * 0.15 : 0,
      trail: [],
      wobble: 0,
      wobbleSpeed: (Math.random() - 0.5) * 0.04,
      growTimer: Math.random() * 300,
    };
  }
  const conds = Array.from({ length: 70 }, makeCondensation);

  // ── Streak lines (water streaks on glass) ──
  function makeStreak() {
    return {
      x: Math.random() * window.innerWidth,
      y: -20,
      len: Math.random() * 80 + 40,
      speed: Math.random() * 1.5 + 0.5,
      alpha: Math.random() * 0.08 + 0.02,
      width: Math.random() * 1.5 + 0.5,
      active: Math.random() < 0.3
    };
  }
  const streaks = Array.from({ length: 15 }, makeStreak);

  function drawDrop(x, y, r, alpha, sliding) {
    rc.save();
    rc.translate(x, y);

    // Teardrop path: round top, pointed bottom tip
    const tipY = r * (sliding ? 1.7 : 1.3); // longer tip when sliding fast
    rc.beginPath();
    rc.moveTo(0, -r);
    rc.bezierCurveTo( r * 0.95, -r * 0.3,  r * 0.95,  r * 0.5,  0, tipY);
    rc.bezierCurveTo(-r * 0.95,  r * 0.5, -r * 0.95, -r * 0.3,  0, -r);
    rc.closePath();

    // Body gradient
    const bodyGrad = rc.createRadialGradient(-r*0.2, -r*0.3, r*0.05, 0, r*0.2, r*1.2);
    bodyGrad.addColorStop(0,   `rgba(235,248,255,${alpha * 1.15})`);
    bodyGrad.addColorStop(0.35,`rgba(200,228,255,${alpha * 0.9})`);
    bodyGrad.addColorStop(0.7, `rgba(160,200,245,${alpha * 0.65})`);
    bodyGrad.addColorStop(1,   `rgba(120,165,225,${alpha * 0.2})`);
    rc.fillStyle = bodyGrad;
    rc.fill();

    // Rim
    rc.strokeStyle = `rgba(210,235,255,${alpha * 0.35})`;
    rc.lineWidth = 0.6;
    rc.stroke();

    // Main highlight — top-left oval
    rc.beginPath();
    rc.ellipse(-r*0.22, -r*0.38, r*0.32, r*0.2, -0.5, 0, Math.PI*2);
    const hl = rc.createRadialGradient(-r*0.22, -r*0.38, 0, -r*0.22, -r*0.38, r*0.32);
    hl.addColorStop(0, `rgba(255,255,255,${alpha * 1.3})`);
    hl.addColorStop(1, `rgba(255,255,255,0)`);
    rc.fillStyle = hl;
    rc.fill();

    // Small secondary highlight
    rc.beginPath();
    rc.arc(r*0.25, r*0.15, r*0.1, 0, Math.PI*2);
    rc.fillStyle = `rgba(255,255,255,${alpha*0.3})`;
    rc.fill();

    rc.restore();
  }

  let frame = 0;
  function drawRain() {
    rc.clearRect(0, 0, rainCanvas.width, rainCanvas.height);
    frame++;

    // Falling rain streaks
    rainDrops.forEach(d => {
      rc.beginPath();
      rc.moveTo(d.x, d.y);
      rc.lineTo(d.x + d.wind * (d.len / d.speed), d.y + d.len);
      const rainGrad = rc.createLinearGradient(d.x, d.y, d.x, d.y + d.len);
      rainGrad.addColorStop(0, `rgba(200,220,255,0)`);
      rainGrad.addColorStop(0.5, `rgba(200,220,255,${d.alpha})`);
      rainGrad.addColorStop(1, `rgba(200,220,255,0)`);
      rc.strokeStyle = rainGrad;
      rc.lineWidth = d.width;
      rc.stroke();

      d.y += d.speed;
      d.x += d.wind;
      if (d.y > rainCanvas.height + 30) {
        Object.assign(d, makeRainDrop());
        d.y = -20;
      }
    });

    // Glass streaks
    streaks.forEach(s => {
      if (!s.active) {
        if (Math.random() < 0.001) s.active = true;
        return;
      }
      const sg = rc.createLinearGradient(s.x, s.y, s.x, s.y + s.len);
      sg.addColorStop(0, `rgba(200,225,255,0)`);
      sg.addColorStop(0.3, `rgba(200,225,255,${s.alpha})`);
      sg.addColorStop(1, `rgba(200,225,255,0)`);
      rc.beginPath();
      rc.moveTo(s.x, s.y);
      rc.lineTo(s.x + (Math.random()-0.5)*2, s.y + s.len);
      rc.strokeStyle = sg;
      rc.lineWidth = s.width;
      rc.stroke();
      s.y += s.speed;
      if (s.y > rainCanvas.height + 100) {
        Object.assign(s, makeStreak());
        s.active = false;
      }
    });

    // Condensation
    conds.forEach(c => {
      // Grow occasionally
      if (frame % 120 === 0 && Math.random() < 0.1 && c.r < 8) {
        c.r += 0.3;
        c.alpha = Math.min(c.alpha + 0.01, 0.3);
      }

      // Trail for sliding drops
      if (c.vy > 0 && c.trail.length > 1) {
        rc.beginPath();
        rc.moveTo(c.trail[0].x, c.trail[0].y);
        for (let i = 1; i < c.trail.length; i++) {
          const t0 = c.trail[i-1], t1 = c.trail[i];
          const mx = (t0.x + t1.x) / 2, my = (t0.y + t1.y) / 2;
          rc.quadraticCurveTo(t0.x, t0.y, mx, my);
        }
        const trailGrad = rc.createLinearGradient(
          c.trail[0].x, c.trail[0].y,
          c.x, c.y
        );
        trailGrad.addColorStop(0, `rgba(180,210,255,0)`);
        trailGrad.addColorStop(1, `rgba(200,225,255,${c.alpha * 0.35})`);
        rc.strokeStyle = trailGrad;
        rc.lineWidth = c.r * 1.4;
        rc.lineCap = 'round';
        rc.lineJoin = 'round';
        rc.stroke();
      }

      drawDrop(c.x, c.y, c.r, c.alpha, c.vy > 1.5);

      // Slide with inertia & gravity
      if (c.vy > 0) {
        c.trail.push({ x: c.x, y: c.y });
        if (c.trail.length > 40) c.trail.shift();

        // Gravity acceleration
        c.vy += 0.012;
        // Surface tension — occasional resistance/stick
        if (Math.random() < 0.008) c.vy *= 0.4;
        // Speed cap
        c.vy = Math.min(c.vy, 4.5);

        // Horizontal wobble (surface irregularity)
        c.vx += (Math.random() - 0.5) * 0.06;
        c.vx *= 0.92; // friction
        c.vx = Math.max(-0.6, Math.min(0.6, c.vx));

        c.x += c.vx;
        c.y += c.vy;

        // Absorb nearby static drops (merge)
        conds.forEach(other => {
          if (other === c || other.vy > 0) return;
          const dx = other.x - c.x, dy = other.y - c.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < c.r + other.r + 1) {
            // merge: grow current, remove other
            c.r = Math.min(c.r + other.r * 0.4, 10);
            c.vy += 0.05; // speed boost from merge
            other.r = Math.random() * 3 + 1;
            other.x = Math.random() * rainCanvas.width;
            other.y = Math.random() * rainCanvas.height;
            other.trail = [];
          }
        });

        if (c.y > rainCanvas.height + 20) {
          Object.assign(c, makeCondensation());
          c.y = Math.random() * 50;
        }
      }
    });

    requestAnimationFrame(drawRain);
  }
  drawRain();


  // ── DM via Discord Webhook ──
  const WEBHOOK = 'https://discord.com/api/webhooks/1488102619913392298/aOg20N1DRoryK1ORi4tXo-nHJ98b2zaHV6EFHPO5I_hAPujw5NrZUa3PiEEuNHLYcNDF';
  const COOLDOWN_MS = 2 * 60 * 1000; // 2分

  const dmOpenBtn  = document.getElementById('dmOpenBtn');
  const dmOverlay  = document.getElementById('dmOverlay');
  const dmCancel   = document.getElementById('dmCancel');
  const dmSend     = document.getElementById('dmSend');
  const dmText     = document.getElementById('dmText');
  const dmStatus   = document.getElementById('dmStatus');

  function openDM() {
    dmOverlay.classList.add('open');
    dmText.focus();
    checkCooldown();
  }
  function closeDM() {
    dmOverlay.classList.remove('open');
    dmStatus.textContent = '';
    dmStatus.className = 'dm-status';
  }

  dmOpenBtn.addEventListener('click', openDM);
  dmCancel.addEventListener('click', closeDM);
  dmOverlay.addEventListener('click', (e) => { if (e.target === dmOverlay) closeDM(); });

  function checkCooldown() {
    const last = parseInt(localStorage.getItem('dmLastSent') || '0');
    const remaining = COOLDOWN_MS - (Date.now() - last);
    if (remaining > 0) {
      dmSend.disabled = true;
      const mins = Math.ceil(remaining / 60000);
      const secs = Math.ceil((remaining % 60000) / 1000);
      dmStatus.textContent = `あと ${mins > 0 ? mins + '分' : ''}${secs}秒後に送れます`;
      dmStatus.className = 'dm-status';
      setTimeout(checkCooldown, 1000);
    } else {
      dmSend.disabled = false;
      dmStatus.textContent = '';
    }
  }

  dmSend.addEventListener('click', async () => {
    const msg = dmText.value.trim();
    if (!msg) {
      dmStatus.textContent = 'メッセージを入力してください';
      dmStatus.className = 'dm-status error';
      return;
    }

    dmSend.disabled = true;
    dmStatus.textContent = '送信中...';
    dmStatus.className = 'dm-status';

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: `📨 **サイトからのメッセージ**\n${msg}` })
      });

      if (res.ok) {
        localStorage.setItem('dmLastSent', Date.now().toString());
        dmStatus.textContent = '送信しました！';
        dmStatus.className = 'dm-status success';
        dmText.value = '';
        setTimeout(() => { checkCooldown(); }, 1500);
      } else {
        throw new Error('failed');
      }
    } catch(e) {
      dmStatus.textContent = '送信に失敗しました';
      dmStatus.className = 'dm-status error';
      dmSend.disabled = false;
    }
  });
